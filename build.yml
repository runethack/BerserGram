name: Build BerserGram
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Cherrygram
        run: |
          git clone https://github.com/arsLan4k1390/Cherrygram.git /tmp/cherrygram
          ls -la /tmp/cherrygram/

      - name: Copy custom files into Cherrygram
        run: |
          cp -f TMessagesProj/src/main/res/values/strings.xml /tmp/cherrygram/TMessagesProj/src/main/res/values/strings.xml
          cp -f TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java /tmp/cherrygram/TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java
          cp -f TMessagesProj_App/build.gradle /tmp/cherrygram/TMessagesProj_App/build.gradle

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        working-directory: /tmp/cherrygram
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BerserGram
          path: /tmp/cherrygram/TMessagesProj_App/build/outputs/apk/debug/*.apk
